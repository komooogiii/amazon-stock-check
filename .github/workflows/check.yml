name: Amazon Stock Check

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run stock check
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: pwsh check.ps1

      - name: Commit state changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add amazon_stock_state.txt amazon_stock_check.log
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stock state and log" && git push https://x-access-token:${GITHUB_TOKEN}@github.com/komooogiii/amazon-stock-check.git)
